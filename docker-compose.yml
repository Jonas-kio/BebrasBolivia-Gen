services:
  postgres_db:
    image: postgres:15-alpine
    container_name: bebras_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-bebras_bolivia}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev_user} -d ${DB_NAME:-bebras_bolivia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./servicios/servicio-usuario
      dockerfile: Dockerfile
    container_name: bebras_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      USER_SERVICE_PORT: ${BACKEND_PORT:-4102}
      URL_CLIENTE: ${URL_CLIENTE:-http://localhost:3000}
      DATABASE_URL: postgresql://${DB_USER:-dev_user}:${DB_PASSWORD:-dev_password}@postgres_db:5432/${DB_NAME:-bebras_bolivia}?schema=bebras
    ports:
      - "${BACKEND_PORT:-4102}:4102"
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4102/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./cliente
      dockerfile: Dockerfile
    container_name: bebras_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4102/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
