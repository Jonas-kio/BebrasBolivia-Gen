name: CD - Deploy Local

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Integracion continua
    runs-on: self-hosted

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm run install:all

      - name: Verificar formato
        run: npm run format:check

      - name: Analisis estatico
        run: npm run lint

      - name: Ejecutar pruebas
        run: npm test

      - name: Construir proyecto
        run: npm run build

  deploy:
    name: Deploy en localhost (self-hosted)
    needs: ci
    runs-on: self-hosted

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Detener contenedores previos
        run: docker compose down --remove-orphans
        continue-on-error: true

      - name: Construir y levantar servicios
        run: docker compose up --build -d

      - name: Esperar a que el backend este listo
        run: |
          Write-Host "Esperando al backend..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://localhost:4102/health" -TimeoutSec 5
              if ($response.status -eq "ok" -or $response.ok -eq $true) {
                Write-Host "Backend listo!"
                exit 0
              }
            } catch {
              Write-Host "Backend aun no responde."
            }

            Write-Host "Intento $i/30 - esperando 5s..."
            Start-Sleep -Seconds 5
          }

          Write-Host "ERROR: Backend no respondio a tiempo"
          docker compose logs backend
          exit 1

      - name: Verificar que el frontend responde
        run: |
          Write-Host "Verificando frontend..."
          for ($i = 1; $i -le 15; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:3000" -TimeoutSec 5 -UseBasicParsing
              if ($response.StatusCode -eq 200) {
                Write-Host "Frontend listo!"
                exit 0
              }
            } catch {
              Write-Host "Frontend aun no responde."
            }

            Write-Host "Intento $i/15 - esperando 5s..."
            Start-Sleep -Seconds 5
          }

          Write-Host "WARNING: Frontend no respondio, revisando logs..."
          docker compose logs frontend

      - name: Estado final de los servicios
        run: docker compose ps
