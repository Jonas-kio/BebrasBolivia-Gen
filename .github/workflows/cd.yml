name: CD - Deploy Local

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Integracion continua
    runs-on: [self-hosted, Linux]

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Verificar Node.js local
        run: |
          node -v
          npm -v

      - name: Instalar dependencias
        run: npm run install:all

      - name: Verificar formato
        run: npm run format:check

      - name: Analisis estatico
        run: npm run lint

      - name: Ejecutar pruebas
        run: npm test

      - name: Construir proyecto
        run: npm run build

  deploy:
    name: Deploy en localhost (self-hosted)
    needs: ci
    runs-on: [self-hosted, Linux]

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Ejecutar script de despliegue
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh \
            --db-user "dev_user" \
            --db-password "dev_password" \
            --db-name "bebras_bolivia" \
            --db-port "5432" \
            --backend-port "4102" \
            --frontend-port "3000" \
            --url-cliente "http://localhost:3000" \
            --next-public-api-url "http://localhost:4102/api/v1"

      - name: Esperar a que el backend este listo
        run: |
          echo "Esperando al backend..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4102/health | grep -Eq '"(status|ok)"'; then
                echo "Backend listo!"
                exit 0
            fi
            echo "Intento $i/30 - esperando 5s..."
            sleep 5
          done
          echo "ERROR: Backend no respondio a tiempo"
          docker compose logs backend
          exit 1

      - name: Verificar que el frontend responde
        run: |
          echo "Verificando frontend..."
          for i in $(seq 1 15); do
            if curl -fsS -o /dev/null http://localhost:3000; then
                echo "Frontend listo!"
                exit 0
            fi
            echo "Intento $i/15 - esperando 5s..."
            sleep 5
          done
          echo "WARNING: Frontend no respondio, revisando logs..."
          docker compose logs frontend

      - name: Estado final de los servicios
        run: docker compose ps
