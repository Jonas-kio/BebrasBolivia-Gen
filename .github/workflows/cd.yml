name: CD — Deploy Local

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy en localhost (self-hosted)
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Detener contenedores previos
        run: docker compose down --remove-orphans
        continue-on-error: true

      - name: Construir y levantar servicios
        run: docker compose up --build -d

      - name: Esperar a que el backend esté listo
        run: |
          echo "Esperando al backend..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:4102/health | grep -q '"ok"'; then
              echo "Backend listo!"
              exit 0
            fi
            echo "Intento $i/30 — esperando 5s..."
            sleep 5
          done
          echo "ERROR: Backend no respondió a tiempo"
          docker compose logs backend
          exit 1

      - name: Verificar que el frontend responde
        run: |
          echo "Verificando frontend..."
          for i in $(seq 1 15); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200"; then
              echo "Frontend listo!"
              exit 0
            fi
            echo "Intento $i/15 — esperando 5s..."
            sleep 5
          done
          echo "WARNING: Frontend no respondió, revisando logs..."
          docker compose logs frontend

      - name: Estado final de los servicios
        run: docker compose ps
